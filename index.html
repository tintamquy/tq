<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Công ty TNHH Công Nghệ Số TQ</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0b1120;
            color: white;
        }
        #container {
            display: flex;
            height: 100vh;
        }
        #content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 5rem;
            z-index: 10;
        }
        h1 {
            font-size: 3.5rem;
            margin-bottom: 1rem;
            color: #4da8da; /* Light cobalt accent */
            text-shadow: 0 0 10px rgba(77, 168, 218, 0.5);
        }
        h2 {
            font-size: 1.5rem;
            font-weight: 300;
            color: #a0aec0;
            margin-bottom: 2rem;
        }
        ul {
            list-style: none;
            padding: 0;
            font-size: 1.2rem;
            line-height: 2;
        }
        li::before {
            content: "✓";
            color: #4da8da;
            margin-right: 10px;
        }
        .btn {
            display: inline-block;
            margin-top: 2rem;
            padding: 15px 30px;
            background-color: #0047AB; /* Cobalt blue */
            color: white;
            text-decoration: none;
            border-radius: 30px;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 71, 171, 0.5);
            width: fit-content;
        }
        .btn:hover {
            background-color: #003380;
            box-shadow: 0 6px 20px rgba(0, 71, 171, 0.7);
            transform: translateY(-2px);
        }
        #globe-container {
            flex: 1;
            position: relative;
        }
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        
        @media (max-width: 768px) {
            #container {
                flex-direction: column;
            }
            #content {
                padding: 2rem;
                flex: auto;
                height: 50vh;
            }
            #globe-container {
                height: 50vh;
                flex: auto;
            }
            h1 {
                font-size: 2.5rem;
            }
        }
    </style>
</head>
<body>

<div id="container">
    <div id="content">
        <h1>Công Nghệ Số TQ</h1>
        <h2>Kiến tạo tương lai số của bạn</h2>
        <ul>
            <li>Tư vấn thiết kế cơ sở hạ tầng máy tính</li>
            <li>Giải pháp công nghệ thông tin toàn diện</li>
            <li>Dịch vụ và ứng dụng Trí tuệ nhân tạo (AI)</li>
        </ul>
        <a href="#" class="btn">Liên Hệ Ngay</a>
    </div>
    <div id="globe-container"></div>
</div>

<script>
    // Three.js Setup
    const container = document.getElementById('globe-container');
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, container.clientWidth / container.clientHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
    
    renderer.setSize(container.clientWidth, container.clientHeight);
    container.appendChild(renderer.domElement);

    // Create Globe
    const geometry = new THREE.SphereGeometry(2.5, 64, 64);
    
    // Texture/Material for globe - using wireframe for a tech look
    const material = new THREE.MeshBasicMaterial({ 
        color: 0x4da8da, 
        wireframe: true,
        transparent: true,
        opacity: 0.2
    });
    
    const globe = new THREE.Mesh(geometry, material);
    scene.add(globe);

    // Inner sphere
    const innerGeometry = new THREE.SphereGeometry(2.45, 32, 32);
    const innerMaterial = new THREE.MeshBasicMaterial({
        color: 0x0047AB,
        transparent: true,
        opacity: 0.1
    });
    const innerGlobe = new THREE.Mesh(innerGeometry, innerMaterial);
    scene.add(innerGlobe);

    // Add particles around the globe
    const particlesGeometry = new THREE.BufferGeometry();
    const particlesCount = 1500;
    const posArray = new Float32Array(particlesCount * 3);

    for(let i = 0; i < particlesCount * 3; i++) {
        posArray[i] = (Math.random() - 0.5) * 12;
    }

    particlesGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
    const particlesMaterial = new THREE.PointsMaterial({
        size: 0.02,
        color: 0x4da8da,
        transparent: true,
        opacity: 0.8
    });

    const particlesMesh = new THREE.Points(particlesGeometry, particlesMaterial);
    scene.add(particlesMesh);

    camera.position.z = 6;

    // Animation Loop
    function animate() {
        requestAnimationFrame(animate);

        globe.rotation.y += 0.002;
        globe.rotation.x += 0.001;
        
        innerGlobe.rotation.y -= 0.001;

        particlesMesh.rotation.y -= 0.001;
        particlesMesh.rotation.x += 0.0005;

        renderer.render(scene, camera);
    }

    animate();

    // Handle Resize
    window.addEventListener('resize', () => {
        camera.aspect = container.clientWidth / container.clientHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(container.clientWidth, container.clientHeight);
    });
</script>

</body>
</html>
